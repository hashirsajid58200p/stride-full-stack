<style>
  /* =========================================
   Skeleton Component Styles
   ========================================= */
  .skeleton-box {
    background: linear-gradient(
      90deg,
      var(--color-secondary) 25%,
      var(--color-border) 50%,
      var(--color-secondary) 75%
    );
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 8px;
  }

  @keyframes skeleton-loading {
    0% {
      background-position: 200% 0;
    }
    100% {
      background-position: -200% 0;
    }
  }

  .skeleton-text {
    height: 1.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    display: block;
  }
</style>

<script>
  window.renderSkeletonCardTemplate = function (count = 1) {
    return Array(count)
      .fill(
        `
      <div class="product-card" style="border-color: var(--color-border); box-shadow: none; pointer-events: none;">
        <div class="product-image skeleton-box" style="border-radius: 0;"></div>
        <div class="product-content">
          <div class="product-info">
            <div class="skeleton-box skeleton-text" style="width: 30%; height: 12px; margin-bottom: 8px;"></div>
            <div class="skeleton-box skeleton-text" style="width: 70%; height: 20px; margin-bottom: 8px;"></div>
            <div class="skeleton-box skeleton-text" style="width: 50%; height: 15px; margin-bottom: 12px;"></div>
            <div class="skeleton-box skeleton-text" style="width: 40%; height: 22px;"></div>
          </div>
        </div>
      </div>
    `,
      )
      .join("");
  };
</script>
