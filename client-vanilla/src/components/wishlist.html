<style>
  /* Standalone styles for the wishlist component so it works anywhere */
  .wishlist-component {
    display: flex;
    flex-direction: column;
    width: 100%;
    animation: fadeIn 0.4s ease-out;
  }
  .wishlist-header {
    margin-bottom: 2rem;
  }
  .wishlist-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--color-fg);
  }
  .wishlist-subtitle {
    color: var(--color-muted-fg);
  }
  .wishlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }
  .wish-card {
    background-color: var(--color-secondary);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    min-width: 200px;
    position: relative; /* Allows positioning of delete button */
    transition:
      var(--transition-smooth, all 0.3s ease),
      border-color 0.3s ease;
  }
  .wish-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    border-color: var(--color-accent);
    z-index: 10;
  }

  /* Trash icon for removing items inside the wishlist dashboard */
  .wishlist-remove-icon {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: var(--color-bg);
    color: #ef4444;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    border: 1px solid var(--color-border);
    transition:
      transform 0.1s ease,
      background 0.3s ease,
      color 0.3s ease;
    z-index: 15;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .wishlist-remove-icon:hover {
    background: #ef4444;
    color: white;
    border-color: #ef4444;
  }
  .wishlist-remove-icon:active {
    transform: scale(0.85);
  }

  .card-img-wrapper {
    width: 100%;
    aspect-ratio: 1;
    background-color: var(--color-bg);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 0.25rem;
    transition: background-color 0.5s ease;
  }
  .card-img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card-main-info {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .card-main-info h4 {
    font-size: 1rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--color-fg);
  }
  .card-main-info p {
    color: var(--color-muted-fg);
    font-size: 0.85rem;
  }
  .card-price {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--color-fg);
  }

  /* Single full-width View Details button */
  .wish-actions {
    display: flex;
    margin-top: auto;
    padding-top: 0.75rem;
    border-top: 1px dashed var(--color-border);
  }

  .wish-actions .btn-primary {
    width: 100%;
    font-size: 0.85rem;
    padding: 0.6rem 0.5rem;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    background-color: var(--color-accent);
    color: var(--color-accent-fg);
    border: none;
  }
  .wish-actions .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }
  .wish-actions .btn-primary:active {
    transform: scale(0.95);
  }

  /* Empty State Styling */
  .empty-wishlist-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    background: var(--color-secondary);
    border-radius: 12px;
    border: 1px dashed var(--color-border);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .empty-wishlist-state i {
    font-size: 3rem;
    color: var(--color-muted-fg);
    margin-bottom: 1rem;
  }
  .empty-wishlist-state h3 {
    font-size: 1.5rem;
    color: var(--color-fg);
    margin-bottom: 0.5rem;
  }
  .empty-wishlist-state p {
    color: var(--color-muted-fg);
    margin-bottom: 1.5rem;
  }
  .empty-wishlist-state a {
    padding: 0.8rem 2rem;
  }

  @media (max-width: 576px) {
    .wishlist-title {
      font-size: 1.8rem;
    }
  }
</style>

<div class="wishlist-component">
  <div class="wishlist-header">
    <h2 class="wishlist-title">My Wishlist</h2>
    <p class="wishlist-subtitle">Items you've saved for later.</p>
  </div>
  <div class="wishlist-grid" id="global-wishlist-grid"></div>
</div>

<script>
  // ==========================================
  // THE GLOBAL WISHLIST ENGINE (Centralized Brain)
  // ==========================================
  window.WishlistEngine = {
    getKey: function () {
      return window.auth && window.auth.currentUser
        ? `strideWishlist_${window.auth.currentUser.uid}`
        : "strideWishlist_guest";
    },
    get: function () {
      return JSON.parse(localStorage.getItem(this.getKey())) || [];
    },
    save: function (list, triggerEvent = true) {
      localStorage.setItem(this.getKey(), JSON.stringify(list));
      if (triggerEvent) {
        window.dispatchEvent(new Event("wishlistUpdated"));
      }
    },
    normalizeColor: function (color) {
      if (
        color === undefined ||
        color === null ||
        String(color).trim() === "" ||
        String(color).trim().toLowerCase() === "standard"
      ) {
        return "Default";
      }

      let c = String(color).trim();
      if (c.toLowerCase() === "default") return "Default";
      return c;
    },
    generateId: function (productId, color) {
      return `${productId}|${this.normalizeColor(color)}`;
    },

    // Strict exact check. No more generic fallbacks bridging colors together.
    isSpecificWished: function (productId, color) {
      const compId = this.generateId(productId, color);
      return this.get().some(
        (item) =>
          String(item.id).toLowerCase() === String(compId).toLowerCase(),
      );
    },

    // Handles clicks from the generic Product Card. strictly acts on "Default"
    toggleFromCard: function (product) {
      const userRole = localStorage.getItem("userRole");
      if (!userRole && (!window.auth || !window.auth.currentUser)) {
        window.location.href = "login.html";
        return false;
      }

      let list = this.get();
      const compId = this.generateId(product.id, "Default");
      const index = list.findIndex(
        (item) =>
          String(item.id).toLowerCase() === String(compId).toLowerCase(),
      );

      let isNowWished = false;

      if (index > -1) {
        // Remove strictly the Default variant
        list.splice(index, 1);
        if (window.showToast) window.showToast("Removed from wishlist");
      } else {
        // Add strictly the Default variant
        list.push({
          id: compId,
          productId: product.id,
          name: product.name,
          brand: product.brand,
          price: product.price,
          img: product.main_image_url || product.img,
          color: "Default",
        });
        isNowWished = true;
        if (window.showToast)
          window.showToast(`${product.name} added to wishlist!`, "success");
      }
      this.save(list);
      return isNowWished;
    },

    // Handling clicks from the Product Detail Page strictly on the Active Color
    toggleSpecific: function (product, color, img) {
      const userRole = localStorage.getItem("userRole");
      if (!userRole && (!window.auth || !window.auth.currentUser)) {
        window.location.href = "login.html";
        return false;
      }

      let list = this.get();
      const safeColor = this.normalizeColor(color);
      const compId = this.generateId(product.id, safeColor);
      const index = list.findIndex(
        (item) =>
          String(item.id).toLowerCase() === String(compId).toLowerCase(),
      );

      let isNowWished = false;

      if (index > -1) {
        // Remove this exact specific color
        list.splice(index, 1);
        if (window.showToast) window.showToast("Removed from wishlist");
      } else {
        // Add this specific color as an independent product to the wishlist
        list.push({
          id: compId,
          productId: product.id,
          name: product.name,
          brand: product.brand,
          price: product.price,
          img: img || product.main_image_url || product.img,
          color: safeColor,
        });
        isNowWished = true;

        let cName = safeColor !== "Default" ? ` (${safeColor})` : "";
        if (window.showToast)
          window.showToast(
            `${product.name}${cName} added to wishlist!`,
            "success",
          );
      }
      this.save(list);
      return isNowWished;
    },
  };

  // ==========================================
  // AUTH LISTENER FOR INITIAL SYNC
  // ==========================================
  if (!window.wishlistAuthListenerAttached) {
    const attachAuthListener = () => {
      if (window.auth && typeof window.onAuthStateChanged === "function") {
        window.onAuthStateChanged(window.auth, (user) => {
          window.dispatchEvent(new Event("wishlistUpdated"));
        });
      }
    };

    if (window.auth) {
      attachAuthListener();
    } else {
      window.addEventListener("firebaseInitialized", attachAuthListener);
    }

    window.wishlistAuthListenerAttached = true;
  }

  // ==========================================
  // COMPONENT RENDER LOGIC
  // ==========================================
  window.initWishlistComponent = function () {
    const grid = document.getElementById("global-wishlist-grid");
    if (!grid) return;

    const renderGrid = () => {
      const userRole = localStorage.getItem("userRole");
      if (!userRole && (!window.auth || !window.auth.currentUser)) {
        grid.innerHTML = `
              <div class="empty-wishlist-state">
                  <i class="bi bi-lock-fill"></i>
                  <h3>Login to view Wishlist</h3>
                  <p>Please sign in to see your saved items.</p>
                  <a href="login.html" class="btn-primary">Sign In</a>
              </div>
          `;
        return;
      }

      const dataToRender = window.WishlistEngine.get();

      if (dataToRender.length === 0) {
        grid.innerHTML = `
              <div class="empty-wishlist-state">
                  <i class="bi bi-heartbreak"></i>
                  <h3>Your Wishlist is Empty</h3>
                  <p>Looks like you haven't saved any favorites yet.</p>
                  <a href="products.html" class="btn-primary">Explore Products</a>
              </div>
          `;
        return;
      }

      const wishHtml = dataToRender
        .map(
          (item) => `
          <div class="wish-card">
            <button class="wishlist-remove-icon component-remove-btn" data-id="${item.id}" title="Remove">
              <i class="bi bi-trash"></i>
            </button>
            <div class="card-img-wrapper">
              <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="card-main-info">
              <span class="product-brand" style="font-size:0.7rem; color:var(--color-accent); text-transform:uppercase; font-weight:700;">${item.brand}</span>
              <h4>${item.name} ${item.color !== "Default" ? `<span style="font-weight:400; font-size:0.8rem;">(${item.color})</span>` : ""}</h4>
              <span class="card-price">${typeof window.formatPrice === "function" ? window.formatPrice(item.price) : "$" + item.price.toFixed(2)}</span>
            </div>
            <div class="wish-actions">
              <a href="productDetail.html?id=${item.id}" class="btn-primary">View Details</a>
            </div>
          </div>
        `,
        )
        .join("");

      grid.innerHTML = wishHtml;
    };

    renderGrid();
  };

  // ==========================================
  // COMPONENT EVENT LISTENER (Handling Removals)
  // ==========================================
  if (!window.wishlistComponentListenerAttached) {
    document.addEventListener("click", (e) => {
      const removeBtn = e.target.closest(".component-remove-btn");
      if (removeBtn) {
        const idToRemove = removeBtn.dataset.id;
        let currentWishlist = window.WishlistEngine.get();
        currentWishlist = currentWishlist.filter(
          (item) => item.id !== idToRemove,
        );
        window.WishlistEngine.save(currentWishlist);
        if (window.showToast) window.showToast("Item removed from wishlist");
      }
    });

    window.addEventListener("wishlistUpdated", () => {
      if (document.getElementById("global-wishlist-grid")) {
        window.initWishlistComponent();
      }
    });

    window.wishlistComponentListenerAttached = true;
  }

  // Initial trigger
  window.initWishlistComponent();
</script>
