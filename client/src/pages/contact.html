<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Stride</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/contact.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div id="cart-placeholder"></div>

    <main class="contact-page-wrapper">
      <section class="contact-hero-section">
        <div class="container">
          <div class="contact-header-row">
            <div class="contact-text-col">
              <p class="contact-small-heading">Contact Stride</p>
              <h1 class="contact-main-heading">
                Get in touch with us.<br />
                We're here to assist you.
              </h1>
            </div>

            <div class="contact-social-col">
              <a href="#" class="social-icon-circle" aria-label="Facebook">
                <i class="bi bi-facebook"></i>
              </a>
              <a href="#" class="social-icon-circle" aria-label="Instagram">
                <i class="bi bi-instagram"></i>
              </a>
              <a href="#" class="social-icon-circle" aria-label="Twitter">
                <i class="bi bi-twitter-x"></i>
              </a>
            </div>
          </div>

          <form id="contactForm" class="contact-form">
            <div class="form-inputs-grid">
              <div class="form-group">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" id="name" class="form-control" required />
              </div>

              <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" required />
              </div>

              <div class="form-group">
                <label for="phone" class="form-label"
                  >Phone Number (optional)</label
                >
                <input type="tel" id="phone" class="form-control" />
              </div>

              <div class="form-group full-width">
                <label for="message" class="form-label">Message</label>
                <textarea
                  id="message"
                  class="form-control message-textarea"
                  required
                ></textarea>
              </div>
            </div>

            <button type="submit" class="submit-message-btn">
              Leave us a Message <i class="bi bi-arrow-right"></i>
            </button>
          </form>
        </div>
      </section>

      <section class="contact-info-section">
        <div class="container">
          <div class="contact-info-row">
            <div class="contact-info-left-col">
              <p class="contact-info-small-heading">Contact Info</p>
              <h2 class="contact-info-main-heading">
                We are always happy<br />to assist you
              </h2>
            </div>

            <div class="contact-info-right-col">
              <div class="contact-info-card">
                <h3 class="card-heading">Email Address</h3>
                <div class="card-divider"></div>
                <p class="card-subheading">support@stride.com</p>
                <p class="card-paragraph">
                  Assistance hours:<br />Monday - Friday 9 am to 6 pm EST
                </p>
              </div>

              <div class="contact-info-card">
                <h3 class="card-heading">Number</h3>
                <div class="card-divider"></div>
                <p class="card-subheading">1-800-STRIDE-123</p>
                <p class="card-paragraph">
                  Assistance hours:<br />Monday - Friday 9 am to 6 pm EST
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <div id="footer-placeholder"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/pages/contact.js"></script>
  </body>
</html>
