<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products - Stride</title>
    <meta
      name="description"
      content="Shop the full collection of premium athletic footwear at Stride. Filter by Men, Women, Universal, and top brands like Nike, Adidas, and Puma."
    />

    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/index.css" />
    <link rel="stylesheet" href="../styles/pages/products.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div id="cart-placeholder"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="products-page">
      <div class="container products-layout">
        <aside class="products-sidebar" id="productsSidebar">
          <button class="close-sidebar-btn" id="closeSidebarBtn">
            <i class="bi bi-x-lg"></i>
          </button>

          <div class="sidebar-section">
            <h3 class="sidebar-title">Categories</h3>
            <ul class="sidebar-list" id="category-filter"></ul>
          </div>

          <div class="sidebar-section">
            <h3 class="sidebar-title">Brands</h3>
            <ul class="sidebar-list" id="brand-filter"></ul>
          </div>
        </aside>

        <div class="products-main">
          <div class="products-header">
            <h1 class="page-title">Our Collection</h1>

            <div class="search-filter-group">
              <button
                class="btn btn-outline mobile-sidebar-toggle"
                id="mobileSidebarToggle"
              >
                <i class="bi bi-layout-sidebar"></i> Categories
              </button>

              <div class="search-bar">
                <i class="bi bi-search search-icon"></i>
                <input
                  type="text"
                  id="product-search"
                  placeholder="Search products..."
                />
              </div>

              <button
                class="btn btn-outline filter-toggle-btn"
                id="openFilterModal"
              >
                <i class="bi bi-sliders"></i> Filters
              </button>
            </div>
          </div>

          <div
            class="products-grid featured-products-override"
            id="product-grid"
          ></div>

          <div class="no-results" id="no-results" style="display: none">
            <i class="bi bi-search"></i>
            <h2>No products found</h2>
            <p>Try adjusting your category, brand, or search filters.</p>
            <button class="btn btn-primary" id="clear-filters">
              Clear All Filters
            </button>
          </div>
        </div>
      </div>
    </main>

    <div class="modal-overlay" id="advancedFilterModal">
      <div class="modal-content" style="max-width: 500px">
        <div class="modal-header">
          <h3>Advanced Filters</h3>
          <button class="close-modal" id="closeFilterModal" type="button">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <form id="applyFiltersForm" class="modal-form">
          <div class="form-group full-width">
            <label>Sort By</label>
            <div
              class="custom-select-wrapper"
              id="sortDropdownWrapper"
              tabindex="0"
            >
              <div class="custom-select-display" id="sortDropdownDisplay">
                <span id="sortDropdownText">Default</span>
                <i class="bi bi-chevron-down"></i>
              </div>
              <div class="custom-select-options" id="sortDropdownOptions">
                <div class="custom-select-option selected" data-value="default">
                  Default
                </div>
                <div class="custom-select-option" data-value="name-asc">
                  A to Z
                </div>
                <div class="custom-select-option" data-value="name-desc">
                  Z to A
                </div>
                <div class="custom-select-option" data-value="price-low">
                  Price: Low to High
                </div>
                <div class="custom-select-option" data-value="price-high">
                  Price: High to Low
                </div>
              </div>
            </div>
            <input
              type="hidden"
              id="sort-value-hidden"
              name="sort-by"
              value="default"
            />
          </div>

          <div class="form-group full-width">
            <label id="price-range-label">Price Range</label>
            <div class="form-row price-row">
              <input
                type="number"
                id="min-price"
                placeholder="Min Price"
                min="0"
                step="1"
                class="form-input"
              />
              <input
                type="number"
                id="max-price"
                placeholder="Max Price"
                min="0"
                step="1"
                class="form-input"
              />
            </div>
            <p
              id="price-error"
              class="error-msg"
              style="
                color: #ef4444;
                font-size: 0.85rem;
                margin-top: 0.25rem;
                display: none;
              "
            ></p>
          </div>

          <div class="form-group full-width">
            <label>Available Sizes</label>
            <div class="checkbox-grid">
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="7" /> Size
                7</label
              >
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="8" /> Size
                8</label
              >
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="9" /> Size
                9</label
              >
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="10" /> Size
                10</label
              >
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="11" /> Size
                11</label
              >
              <label class="check-item"
                ><input type="checkbox" name="filter-size" value="12" /> Size
                12</label
              >
            </div>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-primary full-width">
              Apply Filters
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="../scripts/main.js"></script>
    <script type="module" src="../scripts/pages/products.js"></script>
  </body>
</html>
