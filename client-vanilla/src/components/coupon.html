<style>
  /* Component-specific encapsulated styles */
  .coupon-component-wrapper {
    display: flex;
    gap: 0.5rem;
    width: 100%;
  }

  .coupon-component-wrapper input {
    flex: 1;
    padding: 0.75rem 1rem;
    background-color: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    color: var(--color-fg);
    font-family: inherit;
    font-size: 0.95rem;
    transition: border-color 0.3s ease;
  }

  .coupon-component-wrapper input:focus {
    outline: none;
    border-color: var(--color-accent);
  }

  .coupon-component-wrapper button {
    padding: 0.75rem 1.5rem;
    border: 1px solid var(--color-border);
    background-color: var(--color-bg);
    color: var(--color-fg);
    border-radius: 8px;
    font-weight: 600;
    transition: var(--transition-smooth);
    cursor: pointer;
  }

  .coupon-component-wrapper button:hover:not(:disabled) {
    border-color: var(--color-accent);
    color: var(--color-accent);
  }

  .coupon-component-wrapper button:disabled,
  .coupon-component-wrapper input:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
</style>

<div class="coupon-component-wrapper">
  <input type="text" id="shared-coupon-code" placeholder="Discount code" />
  <button type="button" id="shared-apply-coupon">Apply</button>
</div>

<script>
  window.initCouponComponent = function () {
    const applyBtn = document.getElementById("shared-apply-coupon");
    const inputField = document.getElementById("shared-coupon-code");

    // Check if an offer is already applied and restore UI state
    const savedOfferStr = localStorage.getItem("strideAppliedOffer");
    if (savedOfferStr && applyBtn && inputField) {
      try {
        const savedOffer = JSON.parse(savedOfferStr);
        inputField.value = "";
        inputField.placeholder = `Code ${savedOffer.code} Applied!`;
        inputField.disabled = true;
        applyBtn.textContent = "Applied";
        applyBtn.disabled = true;
      } catch (e) {
        console.error("Failed to parse saved offer");
      }
    }

    if (applyBtn && inputField && !inputField.disabled) {
      applyBtn.addEventListener("click", async () => {
        const code = inputField.value.trim();

        if (code === "") {
          if (typeof window.showToast === "function")
            window.showToast("Please enter a discount code.", "error");
          return;
        }

        applyBtn.disabled = true;
        applyBtn.textContent = "Verifying...";
        inputField.disabled = true;

        try {
          if (!window.supabase) {
            throw new Error("Database connection not established.");
          }

          const { data: offer, error } = await window.supabase
            .from("offers")
            .select("*")
            .ilike("code", code)
            .eq("status", "Active")
            .maybeSingle();

          if (error || !offer) {
            throw new Error("Invalid or expired discount code.");
          }

          const today = new Date();
          const validUntil = new Date(offer.valid_until);
          if (today > validUntil) {
            throw new Error("This discount code has expired.");
          }

          // FIX: Save the entire offer object to localStorage so checkout.js can read it!
          localStorage.setItem("strideAppliedOffer", JSON.stringify(offer));

          window.dispatchEvent(
            new CustomEvent("couponApplied", {
              detail: { offer, code },
            }),
          );

          inputField.value = "";
          inputField.placeholder = `Code ${code} Applied!`;
          applyBtn.textContent = "Applied";
        } catch (err) {
          console.error("Coupon verification failed:", err);
          if (typeof window.showToast === "function") {
            window.showToast(err.message, "error");
          } else {
            alert(err.message);
          }
          window.resetCouponComponent();
        }
      });
    }
  };

  window.resetCouponComponent = function () {
    const applyBtn = document.getElementById("shared-apply-coupon");
    const inputField = document.getElementById("shared-coupon-code");

    // Clear global state so math resets
    localStorage.removeItem("strideAppliedOffer");
    localStorage.removeItem("strideDiscount");

    if (applyBtn && inputField) {
      inputField.value = "";
      inputField.placeholder = "Discount code";
      inputField.disabled = false;
      applyBtn.textContent = "Apply";
      applyBtn.disabled = false;
    }
  };
</script>
