<style>
  /* =========================================
     Newsletter Section
     ========================================= */
  .newsletter {
    position: relative;
    padding: 8rem 0;
    /* Default background, overridden by JS data-bg attribute */
    background-image: url("../../../public/images/backgrounds/newsletter_background.jpeg");
    background-size: cover;
    background-position: center;
    text-align: center;
    color: white;
  }

  .newsletter-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1;
  }

  .newsletter-content {
    position: relative;
    z-index: 2;
    max-width: 600px;
    margin: 0 auto;
  }

  .newsletter-intro {
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
    opacity: 0.9;
  }

  .newsletter-title {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .newsletter-text {
    font-size: 1.1rem;
    margin-bottom: 2.5rem;
    opacity: 0.9;
    line-height: 1.6;
  }

  .newsletter-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
  }

  .newsletter-input {
    width: 100%;
    padding: 1.25rem 2rem;
    background: transparent;
    border: 2px solid rgba(255, 255, 255, 0.5);
    color: white;
    font-family: inherit;
    font-size: 1.125rem;
    border-radius: 9999px;
    transition: var(--transition-smooth);
  }

  .newsletter-input::placeholder {
    color: rgba(255, 255, 255, 0.7);
  }

  .newsletter-input:focus {
    outline: none;
    border-color: white;
    background: rgba(255, 255, 255, 0.1);
  }

  .newsletter-form .btn-primary {
    width: 100%;
    padding: 1.25rem 2rem;
    border-radius: 9999px;
    font-weight: 700;
    letter-spacing: 0.05em;
    background-color: var(--color-accent);
    color: var(--color-accent-fg);
    border: none;
    cursor: pointer;
    transition: var(--transition-smooth);
  }

  .newsletter-form .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }

  @media (min-width: 768px) {
    .newsletter-title {
      font-size: 3.5rem;
    }
  }
</style>

<section class="newsletter">
  <div class="newsletter-overlay"></div>
  <div class="container">
    <div class="newsletter-content">
      <p class="newsletter-intro">KEEP ME UPDATED</p>
      <h2 class="newsletter-title">NEWSLETTER</h2>
      <p class="newsletter-text">
        Receive exclusive promotions, private sales and news
      </p>
      <form class="newsletter-form" id="stride-newsletter-form">
        <input
          type="email"
          placeholder="E-mail"
          class="newsletter-input"
          id="stride-newsletter-email"
          aria-label="Email Address"
          required
        />
        <button
          type="submit"
          class="btn btn-primary"
          id="stride-newsletter-btn"
        >
          SUBSCRIBE
        </button>
      </form>
    </div>
  </div>
</section>

<script>
  window.initNewsletter = function () {
    const form = document.getElementById("stride-newsletter-form");
    const emailInput = document.getElementById("stride-newsletter-email");
    const subscribeBtn = document.getElementById("stride-newsletter-btn");

    if (!form || !emailInput || !subscribeBtn) return;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      if (!email) return;

      const originalText = subscribeBtn.textContent;
      subscribeBtn.textContent = "SUBSCRIBING...";
      subscribeBtn.disabled = true;

      try {
        const response = await fetch(
          // Deployment Version
          // "/api/newsletter/subscribe",
          // Local Version
          "http://localhost:5000/api/newsletter/subscribe",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          },
        );

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || "Subscription failed");

        // Show success state
        subscribeBtn.textContent = "✓ SUBSCRIBED!";
        subscribeBtn.style.backgroundColor = "#10b981"; // Success Green

        if (typeof window.showToast === "function") {
          window.showToast("Thank you for subscribing!", "success");
        }

        emailInput.value = "";

        // Reset button after 3 seconds
        setTimeout(() => {
          subscribeBtn.textContent = originalText;
          subscribeBtn.style.backgroundColor = "var(--color-accent)";
        }, 3000);
      } catch (error) {
        console.error("Newsletter Error:", error);

        // Show error state
        emailInput.style.borderColor = "#ef4444"; // Error Red
        if (typeof window.showToast === "function") {
          window.showToast(
            error.message || "Failed to subscribe. Please try again.",
            "error",
          );
        }

        setTimeout(() => {
          emailInput.style.borderColor = "rgba(255, 255, 255, 0.5)";
        }, 1500);
      } finally {
        if (subscribeBtn.textContent !== "✓ SUBSCRIBED!") {
          subscribeBtn.textContent = originalText;
          subscribeBtn.disabled = false;
        } else {
          // If it succeeded, enable it after the 3s timeout finishes
          setTimeout(() => {
            subscribeBtn.disabled = false;
          }, 3000);
        }
      }
    });
  };

  // Automatically initialize if the script is loaded
  if (
    document.readyState === "complete" ||
    document.readyState === "interactive"
  ) {
    window.initNewsletter();
  }
</script>
