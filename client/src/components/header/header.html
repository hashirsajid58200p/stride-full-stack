<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
/>

<nav class="navbar">
  <div class="container header-container">
    <div class="nav-content">
      <div class="nav-left">
        <a href="index.html" class="logo-link" title="Home">
          <img
            src="../../public/images/logos/stride_logo_light.png"
            alt="Stride Logo"
            class="logo-img"
          />
        </a>
      </div>

      <div class="nav-links" id="navLinks">
        <button class="mobile-menu-close" id="mobileMenuClose">
          <i class="bi bi-x-lg"></i>
        </button>

        <a href="products.html?category=new-arrival" data-nav="new-arrival"
          >New Arrivals</a
        >
        <a href="products.html?category=men" data-nav="men">Men</a>
        <a href="products.html?category=women" data-nav="women">Women</a>
        <a href="about.html" data-nav="about">About</a>
        <a href="contact.html" data-nav="contact">Contact</a>
      </div>

      <div class="nav-right">
        <button class="icon-btn search-toggle-btn" aria-label="Search">
          <i class="bi bi-search"></i>
        </button>

        <button class="icon-btn theme-toggle-btn" aria-label="Toggle Theme">
          <i class="bi bi-sun"></i>
        </button>

        <a
          href="clientDashboard.html?view=wishlist"
          class="icon-btn wishlist-btn"
          id="headerWishlistBtn"
          aria-label="Wishlist"
        >
          <i class="bi bi-heart"></i>
        </a>

        <button class="icon-btn cart-btn" aria-label="Shopping Cart">
          <i class="bi bi-cart"></i>
          <span class="cart-badge">0</span>
        </button>

        <div class="account-container">
          <button class="icon-btn account-btn" aria-label="Account">
            <i class="bi bi-person"></i>
          </button>

          <div class="account-dropdown" id="accountDropdown">
            <a href="#" id="dashboardLink" class="dropdown-item">

            <a href="clientDashboard.html?view=profile" class="dropdown-item">
              <i class="bi bi-person"></i> Account
            </a>
            <div class="dropdown-divider"></div>
            <a href="#" id="logoutBtn" class="dropdown-item">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </div>
        </div>

        <button
          class="mobile-menu-btn icon-btn"
          id="mobileMenuBtn"
          aria-label="Menu"
        >
          <i class="bi bi-list"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

<div class="search-modal-overlay" id="searchModal">
  <div class="search-modal-content">
    <div class="search-modal-header">
      <i class="bi bi-search"></i>
      <input
        type="text"
        id="headerSearchInput"
        placeholder="Search for sneakers, brands..."
        autocomplete="off"
      />
      <button class="close-search-btn" id="closeSearchBtn">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="search-results" id="searchResults"></div>
