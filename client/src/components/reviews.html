<style>
  /* =========================================
   Reviews Component Styles
   ========================================= */
  .reviews-section {
    padding: 5rem 0;
    background-color: var(--color-secondary);
    border-top: 1px solid var(--color-border);
  }

  .reviews-section .section-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  /* Match "You May Also Like" heading size */
  .reviews-section .section-title {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--color-fg);
  }

  .reviews-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 3rem;
  }

  .review-submission {
    background: var(--color-bg);
    padding: 2rem;
    border-radius: 12px;
    height: fit-content;
    border: 1px solid var(--color-border);
  }

  .review-form h4 {
    margin-bottom: 1rem;
    font-weight: 700;
    color: var(--color-fg);
  }

  .review-form textarea {
    width: 100%;
    padding: 1rem;
    padding-bottom: 2.5rem; /* Space for the emoji button */
    border-radius: 8px;
    border: 1px solid var(--color-border);
    background: var(--color-secondary);
    color: var(--color-fg);
    height: 120px;
    min-height: 120px;
    font-family: inherit;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: none;
    overflow-y: auto;
  }

  .review-form textarea:focus {
    outline: none;
    border-color: var(--color-accent);
  }

  .reviews-list {
    display: flex;
    flex-direction: column;
    gap: 1rem; /* Tightened the gap between review cards */
  }

  /* Sleeker, tighter Review Item container card */
  .review-item {
    background: var(--color-bg);
    padding: 1.25rem 1.5rem; /* Reduced padding to make the card smaller and sleeker */
    border-radius: 12px;
    border: 1px solid var(--color-border);
    animation: fadeIn 0.4s ease-out;
    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;
  }

  .review-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  }

  .review-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem; /* Slightly tighter margin */
  }

  .review-author-container {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .review-avatar {
    width: 40px;
    height: 40px;
    background-color: var(--color-border);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--color-muted-fg);
    font-size: 1.2rem;
    overflow: hidden; /* Ensures the image stays perfectly circular */
    flex-shrink: 0;
    position: relative;
  }

  .review-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .review-author {
    font-weight: 700;
    font-size: 1rem; /* Slightly smaller font to match sleek card */
    color: var(--color-fg);
  }

  .review-text {
    color: var(--color-muted-fg);
    line-height: 1.5;
    font-size: 0.95rem;
    white-space: pre-line;
  }

  .review-date {
    display: block;
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--color-muted-fg);
  }

  .review-form .btn-primary {
    width: 100%;
    padding: 1rem;
    border-radius: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.9rem;
  }

  /* Inline Profile Loader CSS to ensure it spins correctly inside the avatar */
  .review-avatar .loader {
    position: relative;
    width: 24px;
    height: 24px;
    border-radius: 10px;
  }
  .review-avatar .loader div {
    width: 8%;
    height: 26%;
    background: var(--color-fg); /* Adapts to light/dark mode */
    position: absolute;
    left: 46%;
    top: 37%;
    opacity: 0;
    border-radius: 50px;
    animation: fade458 1s linear infinite;
  }
  @keyframes fade458 {
    from {
      opacity: 1;
    }
    to {
      opacity: 0.25;
    }
  }
  .review-avatar .loader .bar1 {
    transform: rotate(0deg) translate(0, -130%);
    animation-delay: 0s;
  }
  .review-avatar .loader .bar2 {
    transform: rotate(30deg) translate(0, -130%);
    animation-delay: -1.1s;
  }
  .review-avatar .loader .bar3 {
    transform: rotate(60deg) translate(0, -130%);
    animation-delay: -1s;
  }
  .review-avatar .loader .bar4 {
    transform: rotate(90deg) translate(0, -130%);
    animation-delay: -0.9s;
  }
  .review-avatar .loader .bar5 {
    transform: rotate(120deg) translate(0, -130%);
    animation-delay: -0.8s;
  }
  .review-avatar .loader .bar6 {
    transform: rotate(150deg) translate(0, -130%);
    animation-delay: -0.7s;
  }
  .review-avatar .loader .bar7 {
    transform: rotate(180deg) translate(0, -130%);
    animation-delay: -0.6s;
  }
  .review-avatar .loader .bar8 {
    transform: rotate(210deg) translate(0, -130%);
    animation-delay: -0.5s;
  }
  .review-avatar .loader .bar9 {
    transform: rotate(240deg) translate(0, -130%);
    animation-delay: -0.4s;
  }
  .review-avatar .loader .bar10 {
    transform: rotate(270deg) translate(0, -130%);
    animation-delay: -0.3s;
  }
  .review-avatar .loader .bar11 {
    transform: rotate(300deg) translate(0, -130%);
    animation-delay: -0.2s;
  }
  .review-avatar .loader .bar12 {
    transform: rotate(330deg) translate(0, -130%);
    animation-delay: -0.1s;
  }

  /* Toggle Expand Button Styles */
  .review-toggle-btn {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    color: var(--color-fg);
    border-radius: 50%;
    width: 45px;
    height: 45px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
  }
  .review-toggle-btn:hover {
    background: var(--color-accent);
    color: var(--color-accent-fg);
    border-color: var(--color-accent);
    transform: translateY(-2px);
  }

  @media (min-width: 992px) {
    .reviews-layout {
      grid-template-columns: 350px 1fr;
    }
  }
</style>

<section class="reviews-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Customer Reviews</h2>
    </div>
    <div class="reviews-layout">
      <div class="review-submission" id="reviewSubmissionArea"></div>

      <div class="reviews-content-wrapper">
        <div class="reviews-list" id="reviewsList">
          <div style="text-align: center; padding: 2rem">
            <div class="spinner-border text-accent" role="status"></div>
            <p class="mt-2 text-muted">Loading reviews...</p>
          </div>
        </div>

        <div
          id="reviewToggleContainer"
          style="text-align: center; margin-top: 1.5rem; display: none"
        >
          <button
            id="reviewToggleBtn"
            class="review-toggle-btn"
            aria-label="Toggle Reviews"
          >
            <i class="bi bi-chevron-down" id="reviewToggleIcon"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  window.initReviews = async function (productId) {
    if (!productId) return;

    const reviewArea = document.getElementById("reviewSubmissionArea");
    const reviewsList = document.getElementById("reviewsList");
    const userRole = localStorage.getItem("userRole");

    // ==========================================
    // 1. RENDER SUBMISSION AREA
    // ==========================================
    if (!userRole) {
      reviewArea.innerHTML = `
      <div style="text-align: center; padding: 1rem;">
        <i class="bi bi-lock" style="font-size: 2rem; color: var(--color-accent);"></i>
        <h4 style="margin-top: 1rem; color:var(--color-fg); font-weight:700;">Share your thoughts</h4>
        <p style="font-size: 0.9rem; color: var(--color-muted-fg); margin: 1rem 0;">Only registered members can write reviews for Stride products.</p>
        <a href="login.html" class="btn btn-primary" style="display: block; width: 100%; text-transform:uppercase; font-weight:700; padding:1rem;">Login to Review</a>
      </div>
    `;
    } else {
      reviewArea.innerHTML = `
      <form id="reviewForm" class="review-form">
        <h4>Write a Review</h4>
        <div class="rating-input" id="ratingInput" style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--color-accent); cursor: pointer; display:flex; gap:0.25rem;">
          <i class="bi bi-star" data-value="1"></i><i class="bi bi-star" data-value="2"></i><i class="bi bi-star" data-value="3"></i><i class="bi bi-star" data-value="4"></i><i class="bi bi-star" data-value="5"></i>
        </div>
        
        <div style="position: relative; margin: 1rem 0;">
          <textarea id="reviewTextInput" placeholder="Tell others what you think about the fit, quality and comfort..." required></textarea>
          <button type="button" id="emojiToggleBtn" style="position: absolute; bottom: 1.25rem; right: 1rem; background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--color-muted-fg); transition: transform 0.2s;">😀</button>
          
          <div id="emojiPicker" style="display: none; position: absolute; bottom: 3.5rem; right: 0; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; padding: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); gap: 0.5rem; z-index: 10; grid-template-columns: repeat(5, 1fr);">
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">🔥</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">👟</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">😍</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">💯</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">⭐</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">👌</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">👍</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">😎</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">✨</span>
            <span class="emoji-opt" style="cursor:pointer; font-size:1.25rem; transition: transform 0.2s ease;">🏃‍♂️</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitReviewBtn">Post Review</button>
      </form>
    `;

      // Emoji Picker Logic
      const emojiToggleBtn = document.getElementById("emojiToggleBtn");
      const emojiPicker = document.getElementById("emojiPicker");
      const reviewTextInput = document.getElementById("reviewTextInput");

      if (emojiToggleBtn && emojiPicker && reviewTextInput) {
        emojiToggleBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          emojiPicker.style.display =
            emojiPicker.style.display === "none" ? "grid" : "none";
        });

        document.querySelectorAll(".emoji-opt").forEach((emj) => {
          emj.addEventListener("click", (e) => {
            e.stopPropagation();
            reviewTextInput.value += e.target.innerText;
            reviewTextInput.focus();
          });
          emj.addEventListener("mouseover", (e) => {
            e.target.style.transform = "scale(1.3)";
          });
          emj.addEventListener("mouseout", (e) => {
            e.target.style.transform = "scale(1)";
          });
        });

        // Close emoji picker when clicking outside
        document.addEventListener("click", (e) => {
          if (
            emojiPicker.style.display === "grid" &&
            !emojiPicker.contains(e.target) &&
            e.target !== emojiToggleBtn
          ) {
            emojiPicker.style.display = "none";
          }
        });
      }

      // Star Rating Interaction Logic
      const starContainer = document.getElementById("ratingInput");
      const stars = starContainer.querySelectorAll("i");
      let selectedRating = 0;

      stars.forEach((star) => {
        star.addEventListener("mouseover", () => {
          const value = star.dataset.value;
          stars.forEach((s) => {
            s.classList.remove("bi-star-fill");
            s.classList.add("bi-star");
            if (s.dataset.value <= value) {
              s.classList.remove("bi-star");
              s.classList.add("bi-star-fill");
            }
          });
        });

        star.addEventListener("click", () => {
          selectedRating = star.dataset.value;
        });
      });

      starContainer.addEventListener("mouseleave", () => {
        stars.forEach((s) => {
          s.classList.remove("bi-star-fill");
          s.classList.add("bi-star");
          if (s.dataset.value <= selectedRating) {
            s.classList.remove("bi-star");
            s.classList.add("bi-star-fill");
          }
        });
      });

      // Form Submit to Supabase
      const form = document.getElementById("reviewForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const user = window.auth ? window.auth.currentUser : null;
        if (!user) {
          if (window.showToast)
            window.showToast("Please log in to submit a review.", "error");
          return;
        }

        if (selectedRating === 0) {
          if (typeof window.showToast === "function")
            window.showToast("Please select a star rating", "error");
          return;
        }

        const reviewText = reviewTextInput.value;
        const submitBtn = document.getElementById("submitReviewBtn");
        const originalBtnText = submitBtn.innerText;

        submitBtn.disabled = true;
        submitBtn.innerText = "Posting...";

        try {
          const { error } = await window.supabase.from("reviews").insert([
            {
              product_id: productId,
              user_id: user.uid,
              user_name: user.displayName || "Verified Buyer",
              user_photo_url: user.photoURL || null,
              rating: parseInt(selectedRating),
              review_text: reviewText,
            },
          ]);

          if (error) throw error;

          if (typeof window.showToast === "function")
            window.showToast("Review submitted successfully!", "success");

          // Reset form
          form.reset();
          selectedRating = 0;
          stars.forEach((s) => {
            s.classList.remove("bi-star-fill");
            s.classList.add("bi-star");
          });

          // Re-fetch to show new review instantly
          await fetchAndRenderReviews();
        } catch (err) {
          console.error("Error submitting review:", err);
          if (typeof window.showToast === "function")
            window.showToast("Failed to submit review.", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = originalBtnText;
        }
      });
    }

    // ==========================================
    // 2. FETCH & RENDER REVIEWS FROM SUPABASE
    // ==========================================
    function generateStarsHTML(rating) {
      let html = "";
      for (let i = 1; i <= 5; i++) {
        if (i <= rating) {
          html += '<i class="bi bi-star-fill"></i>';
        } else {
          html += '<i class="bi bi-star"></i>';
        }
      }
      return html;
    }

    function updateMainProductRating(avgRating, totalCount) {
      const ratingEl = document.querySelector(".product-rating");
      if (ratingEl) {
        ratingEl.innerHTML = `
        <div class="stars">
          ${generateStarsHTML(Math.round(avgRating))}
        </div>
        <span class="review-count">(${totalCount} review${totalCount !== 1 ? "s" : ""})</span>
      `;
        ratingEl.classList.remove("skeleton-box", "skeleton-text");
      }
    }

    async function fetchAndRenderReviews() {
      try {
        const { data: reviews, error } = await window.supabase
          .from("reviews")
          .select("*")
          .eq("product_id", productId)
          .order("created_at", { ascending: false });

        if (error) throw error;

        if (!reviews || reviews.length === 0) {
          reviewsList.innerHTML = `<div class="review-item" style="text-align: center; color: var(--color-muted-fg); border:none; box-shadow:none;">No reviews yet for this product. Be the first to review!</div>`;
          updateMainProductRating(0, 0);
          return;
        }

        // Calculate Average
        const totalRating = reviews.reduce((sum, rev) => sum + rev.rating, 0);
        const avgRating = (totalRating / reviews.length).toFixed(1);

        // Update top UI
        updateMainProductRating(avgRating, reviews.length);

        // Render List with Profile Loaders and Cloudinary Images
        const reviewsHTML = reviews
          .map((r, index) => {
            // Identify reviews after the 2nd one (index >= 2)
            const isHiddenClass = index >= 2 ? "hidden-review" : "";
            const displayStyle = index >= 2 ? 'style="display: none;"' : "";

            const avatarContent = r.user_photo_url
              ? `
                <div class="loader-overlay" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1;">
                  <div class="loader">
                    <div class="bar1"></div><div class="bar2"></div><div class="bar3"></div><div class="bar4"></div><div class="bar5"></div><div class="bar6"></div><div class="bar7"></div><div class="bar8"></div><div class="bar9"></div><div class="bar10"></div><div class="bar11"></div><div class="bar12"></div>
                  </div>
                </div>
                <img src="${r.user_photo_url}" alt="${r.user_name}" style="opacity: 0; width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; transition: opacity 0.3s;" onload="const l = this.previousElementSibling; if(l) l.style.display='none'; this.style.opacity='1';" onerror="this.outerHTML='<i class=\\'bi bi-person-fill\\' style=\\'z-index: 3; position: relative;\\'></i>'" />
              `
              : `<i class="bi bi-person-fill"></i>`;

            return `
              <div class="review-item ${isHiddenClass}" ${displayStyle}>
                <div class="review-meta">
                  <div class="review-author-container">
                    <div class="review-avatar">${avatarContent}</div>
                    <span class="review-author">${r.user_name}</span>
                  </div>
                  <div class="stars" style="color: var(--color-accent); font-size: 0.95rem;">
                    ${generateStarsHTML(r.rating)}
                  </div>
                </div>
                <p class="review-text">${r.review_text}</p>
                <span class="review-date">${new Date(r.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}</span>
              </div>
            `;
          })
          .join("");

        reviewsList.innerHTML = reviewsHTML;

        // Toggle Logic Setup (Triggers if there are more than 2 reviews)
        const toggleContainer = document.getElementById(
          "reviewToggleContainer",
        );
        const toggleBtn = document.getElementById("reviewToggleBtn");

        if (reviews.length > 2) {
          toggleContainer.style.display = "block";
          let isExpanded = false;

          // Remove any old event listeners by cloning the node
          const newToggleBtn = toggleBtn.cloneNode(true);
          toggleBtn.parentNode.replaceChild(newToggleBtn, toggleBtn);

          newToggleBtn.addEventListener("click", () => {
            isExpanded = !isExpanded;
            const hiddenItems = reviewsList.querySelectorAll(".hidden-review");

            hiddenItems.forEach((item) => {
              if (isExpanded) {
                item.style.display = "block";
                item.style.animation = "none";
                item.offsetHeight; /* trigger reflow */
                item.style.animation = "fadeIn 0.4s ease-out";
              } else {
                item.style.display = "none";
              }
            });

            // Change Arrow Direction
            newToggleBtn.querySelector("i").className = isExpanded
              ? "bi bi-chevron-up"
              : "bi bi-chevron-down";
          });
        } else {
          toggleContainer.style.display = "none";
        }
      } catch (err) {
        console.error("Error fetching reviews:", err);
        reviewsList.innerHTML = `<div class="review-item" style="text-align: center; color: #ef4444; border:none; box-shadow:none;">Failed to load reviews.</div>`;
      }
    }

    // Kick off fetch
    fetchAndRenderReviews();
  };
</script>
