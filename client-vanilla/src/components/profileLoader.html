<style>
  .profile-loader-instance {
    position: absolute;
    inset: 0;
    background-color: var(--color-accent);
    display: none; /* JS toggles to flex when uploading */
    align-items: center;
    justify-content: center;
    z-index: 30;
    border-radius: 50%;
  }

  /* Scales the loader down specifically when placed inside the top header */
  .header-loader-scale-wrapper .loader {
    transform: scale(0.4);
  }

  .loader {
    position: relative;
    width: 32px;
    height: 32px;
    border-radius: 10px;
  }

  .loader div {
    width: 8%;
    height: 26%;
    background: #ffffff; /* Pure white bars */
    position: absolute;
    left: 46%;
    top: 37%;
    opacity: 0;
    border-radius: 50px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    animation: fade458 1s linear infinite;
  }

  @keyframes fade458 {
    from {
      opacity: 1;
    }
    to {
      opacity: 0.25;
    }
  }

  .loader .bar1 {
    transform: rotate(0deg) translate(0, -130%);
    animation-delay: 0s;
  }
  .loader .bar2 {
    transform: rotate(30deg) translate(0, -130%);
    animation-delay: -1.1s;
  }
  .loader .bar3 {
    transform: rotate(60deg) translate(0, -130%);
    animation-delay: -1s;
  }
  .loader .bar4 {
    transform: rotate(90deg) translate(0, -130%);
    animation-delay: -0.9s;
  }
  .loader .bar5 {
    transform: rotate(120deg) translate(0, -130%);
    animation-delay: -0.8s;
  }
  .loader .bar6 {
    transform: rotate(150deg) translate(0, -130%);
    animation-delay: -0.7s;
  }
  .loader .bar7 {
    transform: rotate(180deg) translate(0, -130%);
    animation-delay: -0.6s;
  }
  .loader .bar8 {
    transform: rotate(210deg) translate(0, -130%);
    animation-delay: -0.5s;
  }
  .loader .bar9 {
    transform: rotate(240deg) translate(0, -130%);
    animation-delay: -0.4s;
  }
  .loader .bar10 {
    transform: rotate(270deg) translate(0, -130%);
    animation-delay: -0.3s;
  }
  .loader .bar11 {
    transform: rotate(300deg) translate(0, -130%);
    animation-delay: -0.2s;
  }
  .loader .bar12 {
    transform: rotate(330deg) translate(0, -130%);
    animation-delay: -0.1s;
  }
</style>

<div class="loader-overlay profile-loader-instance">
  <div class="loader">
    <div class="bar1"></div>
    <div class="bar2"></div>
    <div class="bar3"></div>
    <div class="bar4"></div>
    <div class="bar5"></div>
    <div class="bar6"></div>
    <div class="bar7"></div>
    <div class="bar8"></div>
    <div class="bar9"></div>
    <div class="bar10"></div>
    <div class="bar11"></div>
    <div class="bar12"></div>
  </div>
</div>

<script>
  window.injectProfileLoaders = async function () {
    try {
      // Fetch is relative to the HTML page (e.g., userDashboard.html)
      const response = await fetch("../components/profileLoader.html");
      if (!response.ok) throw new Error("Failed to fetch loader component");

      const html = await response.text();

      // Find all placeholders and inject the loader
      document
        .querySelectorAll(".profile-loader-placeholder")
        .forEach((placeholder) => {
          placeholder.innerHTML = html;

          // If it's the tiny header loader, apply the scale down class
          if (placeholder.classList.contains("header-loader-scale-wrapper")) {
            const loaderInner = placeholder.querySelector(".loader");
            if (loaderInner) loaderInner.classList.add("header-loader-scale");
          }
        });
    } catch (error) {
      console.error("Error injecting profile loader:", error);
    }
  };

  // Attaches functions to the window so the main scripts can trigger them from anywhere
  window.showProfileLoaders = function () {
    document
      .querySelectorAll(".profile-loader-instance")
      .forEach((l) => (l.style.display = "flex"));
  };

  window.hideProfileLoaders = function () {
    document
      .querySelectorAll(".profile-loader-instance")
      .forEach((l) => (l.style.display = "none"));
  };
</script>
