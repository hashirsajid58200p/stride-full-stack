<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stride</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/login.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="login-page-wrapper">
      <div class="split-card">
        <div class="split-card-left">
          <div class="login-header">
            <h1 class="title">Login</h1>
            <p class="subtitle">
              Hi, Welcome back
              <img
                src="../../public/images/logos/login.png"
                alt="Robot Icon"
                class="welcome-icon"
              />
            </p>
          </div>

          <form id="loginForm" class="login-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required />
            </div>

            <div class="form-options">
              <div class="checkbox-group">
                <input type="checkbox" id="remember" />
                <label for="remember">Remember me</label>
              </div>
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn">LOGIN</button>

            <div class="divider">
              <span>OR</span>
            </div>

            <div class="social-login">
              <button type="button" class="social-btn">
                <i class="bi bi-google"></i> Continue with Google
              </button>
              <button type="button" class="social-btn">
                <i class="bi bi-apple"></i> Continue with Apple
              </button>
            </div>

            <p class="signup-link">
              Don't have an account? <a href="signup.html">Sign Up</a>
            </p>
          </form>
        </div>

        <div class="split-card-right"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="toast" class="toast"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/pages/login.js"></script>
  </body>
</html>
