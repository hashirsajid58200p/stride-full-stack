<div
  id="stride-global-loader"
  style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #ffffff;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition:
      opacity 0.6s ease-out,
      visibility 0.6s ease-out;
  "
>
  <video
    id="loader-video"
    autoplay
    loop
    muted
    playsinline
    controlsList="nodownload nofullscreen noremoteplayback"
    oncontextmenu="return false;"
    style="
      width: 200px;
      height: auto;
      border-radius: 12px;
      outline: none;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    "
  >
    <source src="../../public/videos/loader.mp4" type="video/mp4" />
  </video>
</div>

<script>
  window.initLoader = function () {
    const loader = document.getElementById("stride-global-loader");
    if (!loader) return;

    const minimumLoadTime = 1000; // Dropped to 1 second
    const startTime = Date.now();

    function hideLoader() {
      const timeElapsed = Date.now() - startTime;
      const timeRemaining = Math.max(0, minimumLoadTime - timeElapsed);

      setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.visibility = "hidden";

        const scrollLock = document.getElementById("loader-scroll-lock");
        if (scrollLock) {
          scrollLock.remove();
        }

        setTimeout(() => {
          if (loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 600);
      }, timeRemaining);
    }

    // SPEED FIX: Do NOT wait for window.onload (which waits for heavy video files)
    if (
      document.readyState === "complete" ||
      document.readyState === "interactive"
    ) {
      hideLoader();
    } else {
      window.addEventListener("DOMContentLoaded", hideLoader);
    }

    // Ultimate Safety Net: Never trap the user for more than 2.5 seconds!
    setTimeout(hideLoader, 2500);
  };
</script>
