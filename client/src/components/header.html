<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
/>

<style>
  /* Navigation */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;

    background-color: var(--nav-bg-transparent);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);

    border-bottom: 1px solid var(--nav-border);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);

    transition:
      background-color 0.4s ease,
      box-shadow 0.4s ease,
      border-color 0.4s ease;
  }

  /* OVERRIDE: The perfectly balanced "Goldilocks" margins */
  .navbar .header-container {
    max-width: 100% !important;
    padding: 0 3vw !important; /* Perfectly balanced: not too wide, not too narrow */
    margin: 0 auto;
  }

  .navbar.scrolled {
    background-color: var(--nav-bg-solid);
    box-shadow: var(--nav-shadow);
  }

  .nav-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: relative;
  }

  .nav-left {
    display: flex;
    align-items: center;
  }

  .logo-link {
    display: flex;
    align-items: center;
  }

  .logo-img {
    height: 135px;
    width: auto;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    transition: background-color 0.3s;
    cursor: pointer;
    font-size: 18px;
    color: var(--color-fg);
    background: transparent;
    border: none;
    text-decoration: none;
  }

  .icon-btn i {
    font-size: 1.2rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn:hover {
    background-color: var(--color-secondary);
    color: var(--color-accent);
  }

  .cart-btn {
    position: relative;
  }

  .cart-badge {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    background: var(--color-accent);
    color: var(--color-accent-fg);
    font-size: 0.625rem;
    border-radius: 50%;
  }

  /* =========================================
   Desktop Nav Links & Active State Indicators
   ========================================= */
  .mobile-menu-btn {
    display: none !important;
  }

  .mobile-menu-close {
    display: none;
  }

  /* ABSOLUTE CENTERING FOR LINKS */
  .nav-links {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .nav-links a {
    position: relative;
    font-size: 0.875rem;
    font-weight: 600;
    transition: color 0.3s;
    text-decoration: none;
    color: var(--color-primary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.5rem 0;
  }

  .nav-links a::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0%;
    height: 2px;
    background-color: var(--color-accent);
    transition: width 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--color-accent);
  }

  .nav-links a:hover::after,
  .nav-links a.active::after {
    width: 100%;
  }

  .nav-links a.active {
    color: var(--color-accent);
  }

  /* =========================================
   Account Dropdown Styles
   ========================================= */
  .account-container {
    position: relative;
  }

  .account-dropdown {
    position: absolute;
    top: 130%;
    right: 0;
    background-color: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    min-width: 200px;
    display: flex;
    flex-direction: column;
    padding: 0.5rem;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: var(--transition-smooth);
  }

  .account-dropdown.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    color: var(--color-fg);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 8px;
    transition:
      background-color 0.2s ease,
      color 0.2s ease;
  }

  .dropdown-item:hover {
    background-color: var(--color-secondary);
    color: var(--color-accent);
  }

  .dropdown-item i {
    font-size: 1.1rem;
    color: var(--color-muted-fg);
    transition: color 0.2s ease;
  }

  .dropdown-item:hover i {
    color: var(--color-accent);
  }

  .dropdown-divider {
    height: 1px;
    background-color: var(--color-border);
    margin: 0.5rem 0;
  }

  /* =========================================
   Search Modal Overlay Styles
   ========================================= */
  .search-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 2000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 15vh;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition-smooth);
    backdrop-filter: blur(5px);
  }

  .search-modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .search-modal-content {
    background: var(--color-bg);
    width: 90%;
    max-width: 600px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    transform: translateY(-20px);
    transition: var(--transition-smooth);
  }

  .search-modal-overlay.active .search-modal-content {
    transform: translateY(0);
  }

  .search-modal-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--color-border);
  }

  .search-modal-header i.bi-search {
    font-size: 1.2rem;
    color: var(--color-muted-fg);
    margin-right: 1rem;
  }

  .search-modal-header input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 1.1rem;
    color: var(--color-fg);
    outline: none;
    font-family: inherit;
  }

  .close-search-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: var(--color-muted-fg);
    cursor: pointer;
    transition: color 0.3s;
  }

  .close-search-btn:hover {
    color: var(--color-accent);
  }

  .search-results {
    max-height: 350px;
    overflow-y: auto;
    padding: 1rem;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem;
    border-radius: 8px;
    text-decoration: none;
    color: var(--color-fg);
    transition: background-color 0.2s;
  }

  .search-result-item:hover {
    background-color: var(--color-secondary);
  }

  .search-result-img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 6px;
    background-color: var(--color-secondary);
  }

  .search-result-info {
    display: flex;
    flex-direction: column;
  }

  .search-result-brand {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--color-accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.1rem;
  }

  .search-result-name {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .search-result-price {
    color: var(--color-fg);
    font-weight: 700;
    font-size: 0.9rem;
    margin-top: 0.1rem;
  }

  .no-search-results {
    padding: 2rem;
    text-align: center;
    color: var(--color-muted-fg);
    font-size: 0.95rem;
  }

  /* =========================================
   Mobile Sidebar Drawer Styles & Responsiveness
   ========================================= */
  .mobile-menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 990; /* Kept safely below the navbar */
    backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }

  .mobile-menu-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  @media (max-width: 992px) {
    /* Show hamburger button on mobile */
    .mobile-menu-btn {
      display: flex !important;
    }

    /* Break the desktop centering completely for mobile layout */
    .nav-links {
      position: fixed;
      top: 0;
      right: 0;
      left: auto; /* Overrides the absolute left: 50% */
      transform: translateX(100%); /* Slides entirely off screen right */
      width: 280px;
      height: 100vh;
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start; /* Resets align-items from center */
      padding: 5rem 2rem 2rem 2rem;
      box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2001;
      gap: 0;
    }

    /* Drawer Slides into view */
    .nav-links.active {
      transform: translateX(0);
    }

    .mobile-menu-close {
      display: block;
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--color-fg);
      cursor: pointer;
    }

    .nav-links a {
      font-size: 1.05rem; /* Base mobile text size */
      padding: 1rem 0;
      border-bottom: 1px solid var(--color-border);
      width: 100%;
      display: block;
    }

    .nav-links a:last-child {
      border-bottom: none;
    }

    .nav-links a::after {
      bottom: 0;
    }
  }

  /* NEW FIX: Tablet Responsiveness */
  @media (max-width: 768px) {
    .logo-img {
      height: 90px; /* Adjusted logo size */
      object-fit: contain;
    }
  }

  /* NEW FIX: Mobile Responsiveness - Stops horizontal scrolling completely */
  @media (max-width: 576px) {
    .navbar .header-container {
      padding: 0 0.75rem !important; /* Tighter padding for small screens */
    }

    /* Boosted logo size for mobile */
    .logo-img {
      height: auto;
      max-width: 180px; /* Increased from 150px */
      max-height: 80px; /* Increased from 70px */
      object-fit: contain;
    }

    .nav-right {
      gap: 0; /* Remove gaps between buttons to fit them all perfectly */
    }

    /* Shrunk icon buttons to give logo more space */
    .icon-btn {
      width: 30px; /* Decreased from 34px */
      height: 30px; /* Decreased from 34px */
    }

    .icon-btn i {
      font-size: 1rem; /* Decreased from 1.1rem */
    }

    .cart-badge {
      width: 14px;
      height: 14px;
      font-size: 0.55rem;
      top: -2px; /* Adjusted positioning for smaller button */
      right: -2px;
    }

    /* Shrunk Navlinks specifically for smaller mobile screens */
    .nav-links a {
      font-size: 0.95rem; /* Shrunk down for sleekness */
      padding: 0.85rem 0;
    }

    .mobile-menu-close {
      font-size: 1.2rem; /* Shrunk the X button to match the new text scale */
    }
  }
</style>

      <div class="nav-links" id="navLinks">

        <a href="products.html?category=new-arrival" data-nav="new-arrival"
          >New Arrivals</a
        >
        <a href="products.html?category=men" data-nav="men">Men</a>
        <a href="products.html?category=women" data-nav="women">Women</a>

<div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

<div class="search-modal-overlay" id="searchModal">
  <div class="search-modal-content">
    <div class="search-modal-header">
      <i class="bi bi-search"></i>
      <input
        type="text"
        id="headerSearchInput"
        placeholder="Search for sneakers, brands..."
        autocomplete="off"
      />
      <button class="close-search-btn" id="closeSearchBtn">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<script>
  window.initHeader = function () {
    // ==========================================
    // Active Page Indicator & Seamless Navigation Logic
    // ==========================================
    const currentPath =
      window.location.pathname.split("/").pop() || "index.html";
    const urlParams = new URLSearchParams(window.location.search);
    const currentCategory = urlParams.get("category");
    const navLinksAnchor = document.querySelectorAll(".nav-links a");

    function updateActiveLink(targetCategory) {
      navLinksAnchor.forEach((link) => {
        link.classList.remove("active");
        const dataNav = link.getAttribute("data-nav");

        if (currentPath === "products.html" && targetCategory === dataNav) {
          link.classList.add("active");
        } else if (currentPath === "about.html" && dataNav === "about") {
          link.classList.add("active");
        } else if (currentPath === "contact.html" && dataNav === "contact") {
          link.classList.add("active");
        }
      });
    }

    // Initial load check
    updateActiveLink(currentCategory);

    // Seamless navigation: If on products page and clicked a product link, don't reload!
    navLinksAnchor.forEach((link) => {
      link.addEventListener("click", (e) => {
        const href = link.getAttribute("href");

        if (
          currentPath === "products.html" &&
          href.startsWith("products.html")
        ) {
          e.preventDefault();
          const targetCategory = link.getAttribute("data-nav");

          const newUrl =
            window.location.protocol +
            "//" +
            window.location.host +
            window.location.pathname +
            "?category=" +
            targetCategory;
          window.history.pushState({ path: newUrl }, "", newUrl);

          updateActiveLink(targetCategory);
          window.dispatchEvent(
            new CustomEvent("categoryChanged", { detail: targetCategory }),
          );

          if (window.innerWidth <= 992) closeMobileMenu();
        }
      });
    });

    // Seamless Wishlist redirect if already on Dashboard
    const wishlistBtn = document.getElementById("headerWishlistBtn");
    if (wishlistBtn) {
      wishlistBtn.addEventListener("click", (e) => {
        if (currentPath === "userDashboard.html") {
          e.preventDefault();
          const newUrl =
            window.location.protocol +
            "//" +
            window.location.host +
            window.location.pathname +
            "?view=wishlist";
          window.history.pushState({ path: newUrl }, "", newUrl);
          window.dispatchEvent(
            new CustomEvent("viewChanged", { detail: "wishlist" }),
          );
        }
      });
    }

    // ==========================================
    // Mobile Menu Slide-Out Drawer Logic
    // ==========================================
    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileMenuClose = document.getElementById("mobileMenuClose");
    const mobileMenuOverlay = document.getElementById("mobileMenuOverlay");
    const navLinks = document.getElementById("navLinks");

    function openMobileMenu() {
      navLinks.classList.add("active");
      mobileMenuOverlay.classList.add("active");
      document.body.style.overflow = "hidden"; // Prevent scrolling behind drawer
    }

    function closeMobileMenu() {
      navLinks.classList.remove("active");
      mobileMenuOverlay.classList.remove("active");
      document.body.style.overflow = "";
    }

    if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", openMobileMenu);
    if (mobileMenuClose)
      mobileMenuClose.addEventListener("click", closeMobileMenu);
    if (mobileMenuOverlay)
      mobileMenuOverlay.addEventListener("click", closeMobileMenu);

    // ==========================================
    // Navbar Background on Scroll
    // ==========================================
    const navbar = document.querySelector(".navbar");

    function handleScroll() {
      if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
      } else {
        navbar.classList.remove("scrolled");
      }
    }

    window.addEventListener("scroll", handleScroll);
    handleScroll();

    // ==========================================
    // Theme Toggle Logic
    // ==========================================
    const themeBtn = document.querySelector(".theme-toggle-btn");
    const themeIcon = themeBtn.querySelector("i");
    const logoImg = document.querySelector(".logo-img");

    if (document.documentElement.getAttribute("data-theme") === "dark") {
      themeIcon.classList.replace("bi-sun", "bi-moon");
      if (logoImg)
        logoImg.src = "../../public/images/logos/stride_logo_dark.png";
    }

    themeBtn.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme");

      if (currentTheme === "dark") {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
        themeIcon.classList.replace("bi-moon", "bi-sun");
        if (logoImg)
          logoImg.src = "../../public/images/logos/stride_logo_light.png";
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        themeIcon.classList.replace("bi-sun", "bi-moon");
        if (logoImg)
          logoImg.src = "../../public/images/logos/stride_logo_dark.png";
      }
    });

    // ==========================================
    // Search Overlay Logic (Dynamic Supabase Search)
    // ==========================================
    const searchToggleBtn = document.querySelector(".search-toggle-btn");
    const searchModal = document.getElementById("searchModal");
    const closeSearchBtn = document.getElementById("closeSearchBtn");
    const searchInput = document.getElementById("headerSearchInput");
    const searchResults = document.getElementById("searchResults");

    let searchTimeout; // Used for debouncing the input

    if (searchToggleBtn && searchModal) {
      searchToggleBtn.addEventListener("click", () => {
        searchModal.classList.add("active");
        document.body.style.overflow = "hidden";
        setTimeout(() => searchInput.focus(), 100);
      });

      closeSearchBtn.addEventListener("click", () => {
        searchModal.classList.remove("active");
        document.body.style.overflow = "";
        searchInput.value = "";
        searchResults.innerHTML = "";
      });

      searchModal.addEventListener("click", (e) => {
        if (e.target === searchModal) {
          searchModal.classList.remove("active");
          document.body.style.overflow = "";
        }
      });

      searchInput.addEventListener("input", (e) => {
        clearTimeout(searchTimeout); // Clear previous timer
        const query = e.target.value.trim();

        searchResults.innerHTML = "";

        if (query.length === 0) return;

        searchResults.innerHTML = `<div class="no-search-results">Searching...</div>`;

        // Debounce: Wait 300ms after user stops typing before hitting the database
        searchTimeout = setTimeout(async () => {
          if (!window.supabase) {
            searchResults.innerHTML = `<div class="no-search-results">Database connecting... please wait.</div>`;
            return;
          }

          try {
            // Query Supabase: match if the 'name' OR 'brand' contains the query string (case-insensitive)
            const { data, error } = await window.supabase
              .from("products")
              .select("id, name, brand, price, main_image_url")
              .or(`name.ilike.%${query}%,brand.ilike.%${query}%`)
              .limit(6); // Limit results to top 6 to prevent massive dropdowns

            if (error) throw error;

            searchResults.innerHTML = "";

            if (data.length === 0) {
              searchResults.innerHTML = `<div class="no-search-results">No products found matching "${query}"</div>`;
              return;
            }

            // Render Results with Brand Name included
            data.forEach((p) => {
              const item = document.createElement("a");
              item.href = `productDetail.html?id=${p.id}`;
              item.className = "search-result-item";
              item.innerHTML = `
                <img src="${p.main_image_url}" alt="${p.name}" class="search-result-img" />
                <div class="search-result-info">
                  <span class="search-result-brand">${p.brand}</span>
                  <span class="search-result-name">${p.name}</span>
                  <span class="search-result-price">${typeof window.formatPrice === "function" ? window.formatPrice(p.price) : `$${p.price.toFixed(2)}`}</span>
                </div>
              `;
              searchResults.appendChild(item);
            });
          } catch (err) {
            console.error("Search error:", err);
            searchResults.innerHTML = `<div class="no-search-results">Error performing search. Please try again.</div>`;
          }
        }, 300);
      });
    }

    // ==========================================
    // Account Dropdown & Auth Logic
    // ==========================================
    const accountBtn = document.querySelector(".account-btn");
    const accountDropdown = document.getElementById("accountDropdown");
    const dashboardLink = document.getElementById("dashboardLink");
    const logoutBtn = document.getElementById("logoutBtn");

    if (accountBtn) {
      accountBtn.addEventListener("click", (e) => {
        e.stopPropagation();

        const userRole = localStorage.getItem("userRole");
        const isLoggedIn = userRole || (window.auth && window.auth.currentUser);

        if (!isLoggedIn) {
          // If not logged in, only redirect if we aren't already on the login page
          if (!window.location.pathname.includes("login.html")) {
            window.location.href = "login.html";
          }
        } else {
          // Logged in: Toggle the menu
          accountDropdown.classList.toggle("show");
          if (userRole === "admin") {
            dashboardLink.href = "adminDashboard.html";
          } else {
            dashboardLink.href = "userDashboard.html";
          }
        }
      });
    }

    document.addEventListener("click", (e) => {
      if (accountDropdown && accountDropdown.classList.contains("show")) {
        if (!e.target.closest(".account-container")) {
          accountDropdown.classList.remove("show");
        }
      }
    });

    if (logoutBtn) {
      logoutBtn.addEventListener("click", (e) => {
        e.preventDefault();
        // Remove role from local storage
        localStorage.removeItem("userRole");

        // Sign out from Firebase if available, then redirect
        if (window.auth) {
          window.auth
            .signOut()
            .then(() => {
              window.location.href = "login.html";
            })
            .catch(() => {
              window.location.href = "login.html";
            });
        } else {
          window.location.href = "login.html";
        }
      });
    }
  };
</script>
