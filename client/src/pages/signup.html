<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Stride</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/signup.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="signup-page-wrapper">
      <div class="split-card">
        <div class="split-card-left">
          <div class="signup-header">
            <h1 class="title">Sign Up</h1>
            <p class="subtitle">
              Enter details to create an account
              <img
                src="../../public/images/logos/signup.png"
                alt="Signup Icon"
                class="welcome-icon"
              />
            </p>
          </div>

          <form id="signupForm" class="signup-form">
            <div class="form-row">
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required />
              </div>
              <div class="form-group">
                <label for="mobile">Mobile</label>
                <input type="tel" id="mobile" required />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" required />
              </div>
              <div class="form-group">
                <label for="postalCode">Postal Code</label>
                <input type="text" id="postalCode" required />
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required />
            </div>

            <div class="form-options">
              <div class="checkbox-group">
                <input type="checkbox" id="newsletter" />
                <label for="newsletter">Subscribe to newsletter</label>
              </div>

              <div class="checkbox-group">
                <input type="checkbox" id="terms" required />
                <label for="terms"
                  >I have read, understood and agree to be bound by Stride's
                  Privacy Policy and Terms of Use</label
                >
              </div>
            </div>

            <button type="submit" class="submit-btn">SIGN UP</button>

            <p class="login-link">
              Already have an account? <a href="login.html">Sign In</a>
            </p>

            <div class="divider">
              <span>OR Continue with</span>
            </div>

            <div class="social-login-row">
              <button
                type="button"
                class="social-btn-icon"
                id="googleSignUp"
                aria-label="Sign up with Google"
              >
                <i class="bi bi-google"></i>
              </button>
            </div>
          </form>
        </div>

        <div class="split-card-right"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="toast" class="toast"></div>

    <script type="module" src="../scripts/main.js"></script>
    <script type="module" src="../scripts/pages/signup.js"></script>
  </body>
</html>
