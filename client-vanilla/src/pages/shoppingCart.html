<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - Stride</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/shoppingCart.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div id="cart-placeholder"></div>

    <main class="shopping-cart-page">
      <div class="page-banner">
        <h2>SHOPPING CART</h2>
      </div>

      <div class="container">
        <div class="cart-page-empty" id="cartPageEmpty" style="display: none">
          <i class="bi bi-cart-x"></i>
          <h3>YOUR CART IS EMPTY.</h3>
          <p>
            Before proceed to checkout you must add some products to your
            shopping cart.<br />You will find a lot of interesting products on
            our "Shop" page.
          </p>
          <a href="products.html" class="btn btn-primary return-shop-btn"
            >RETURN TO SHOP</a
          >
        </div>

        <div class="cart-page-filled" id="cartPageFilled">
          <div class="cart-table-header">
            <div class="col-product">PRODUCT</div>
            <div class="col-price text-center">PRICE</div>
            <div class="col-qty text-center">QUANTITY</div>
            <div class="col-total text-center">TOTAL</div>
          </div>

          <div class="cart-page-items" id="cartPageItemsContainer"></div>

          <div class="cart-bottom-section">
            <div
              class="cart-notes-spacer"
              id="shopping-cart-coupon-placeholder"
            ></div>

            <div class="cart-totals">
              <div
                class="subtotal-row cart-discount-row"
                id="shoppingCartDiscountRow"
                style="display: none"
              >
                <span class="label">DISCOUNT:</span>
                <span class="value" id="shoppingCartDiscountValue">-$0.00</span>
              </div>
              <div class="subtotal-row">
                <span class="label">SUBTOTAL:</span>
                <span class="value" id="pageSubtotalValue">$0.00</span>
              </div>
              <a href="checkOut.html" class="btn btn-primary checkout-btn"
                >Check Out</a
              >
            </div>
          </div>
        </div>
      </div>

      <section
        class="related-products-section"
        id="cartRecommendationsSection"
        style="display: none"
      >
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">You May Also Like</h2>
          </div>
          <div
            class="products-grid featured-products-override"
            id="related-products-grid"
          ></div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../scripts/main.js"></script>
    <script type="module" src="../scripts/pages/shoppingCart.js"></script>
  </body>
</html>
