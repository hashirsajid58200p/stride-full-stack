<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Stride</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link
      rel="icon"
      type="image/png"
      href="../../public/images/logos/stride_logo_dark.png"
    />

    <link rel="stylesheet" href="../styles/root.css" />
    <link rel="stylesheet" href="../styles/pages/forgotPassword.css" />
  </head>
  <body>
    <main class="forgot-page-wrapper">
      <div class="centered-card">
        <div class="forgot-header">
          <h1 class="title">Reset Password</h1>
          <p class="subtitle">Enter your email to receive a reset link.</p>
        </div>

        <form id="forgotForm" class="forgot-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
            <span class="input-error" id="email-error"></span>
          </div>

          <div class="form-error" id="form-error"></div>

          <button type="submit" class="submit-btn">SEND RESET LINK</button>

          <p class="login-link">
            Remember your password? <a href="login.html">Log In</a>
          </p>
        </form>
      </div>
    </main>

    <div id="toast" class="toast"></div>

    <script type="module" src="../scripts/main.js"></script>
    <script type="module" src="../scripts/pages/forgotPassword.js"></script>
  </body>
</html>
