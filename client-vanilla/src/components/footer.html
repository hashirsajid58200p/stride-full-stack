<style>
  /* ===================================== */
  /* Footer Base */
  /* ===================================== */

  .footer {
    background: var(--color-primary);
    color: var(--color-primary-fg);
    padding: 4rem 0 2rem 0;
  }

  /* ===================================== */
  /* 1️⃣ TOP SECTION */
  /* ===================================== */

  .footer-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 4rem;
    margin-bottom: 3rem;
  }

  /* Left Side (Logo + Description) */
  .footer-brand-section {
    flex: 0 0 280px; /* fixed width so links stay in row */
  }

  .footer-logo {
    height: 125px; /* Desktop height */
    width: auto;
    margin-bottom: 1rem;
  }

  /* By default (light mode), footer is dark. Hide the light-bg logo */
  .logo-for-light-bg {
    display: none;
  }

  /* In dark mode, footer is light. Swap the logos */
  html[data-theme="dark"] .logo-for-dark-bg {
    display: none;
  }

  html[data-theme="dark"] .logo-for-light-bg {
    display: block;
  }

  .footer-description {
    font-size: 0.85rem;
    color: var(--color-muted-fg);
    line-height: 1.6;
  }

  /* Right Side (Footer Links) */
  .footer-links-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 columns in row */
    gap: 3rem;
  }

  .footer-title {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .footer-links {
    list-style: none;
    padding: 0;
  }

  .footer-links li {
    margin-bottom: 0.6rem;
  }

  .footer-links a {
    font-size: 0.85rem;
    color: var(--color-primary-fg);
    opacity: 0.7;
    transition:
      opacity 0.2s ease,
      color 0.2s ease,
      transform 0.2s ease;
    text-decoration: none;
    display: inline-block; /* Required for transform snapping */
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ===================================== */
  /* 2️⃣ MIDDLE SECTION */
  /* ===================================== */

  .footer-middle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 0;
  }

  .footer-social {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .social-icons {
    display: flex;
    gap: 1rem;
    font-size: 1.4rem;
  }

  .social-icons a {
    color: inherit;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition:
      transform 0.2s ease,
      color 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .social-icons i {
    display: block; /* Better bounding box for transforms */
  }

  /* Payments */
  .footer-payments {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .footer-payments img {
    height: 28px;
    width: auto;
    opacity: 0.8;
  }

  /* ===================================== */
  /* 3️⃣ BOTTOM SECTION (Dynamic Year & Heart) */
  /* ===================================== */

  .footer-bottom {
    text-align: center;
    margin-top: 2rem;
  }

  .footer-bottom p {
    font-size: 0.85rem;
    color: var(--color-muted-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem; /* Perfect spacing between words and icons */
  }

  /* Interactive Heart Icon */
  .heart-icon {
    cursor: pointer;
    font-size: inherit; /* Matches text size exactly */
    transition: color 0.3s ease; /* Smooth color transition, no scaling */
    display: inline-block;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .heart-icon.filled {
    color: var(--color-accent) !important; /* Guaranteed to apply color */
  }

  /* Creator Name with Custom Tooltip and Link styles */
  .creator-name {
    font-weight: normal; /* Removed bolding */
    color: inherit; /* Blends completely with the surrounding text */
    cursor: pointer; /* Makes it clear it's a clickable link */
    text-decoration: none; /* Removes the default link underline */
    position: relative;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  /* Tooltip implementation */
  .creator-name::after {
    content: attr(data-fullname);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background-color: var(--color-accent);
    color: var(--color-accent-fg);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.75rem;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    box-shadow: 0 4px 12px rgba(255, 107, 0, 0.2);
  }

  /* =========================================
   HOVER & ACTIVE STATES (Zero-Lag Fixes)
   ========================================= */

  /* Desktop Hovers */
  @media (hover: hover) {
    .footer-links a:hover {
      opacity: 1;
      color: var(--color-accent);
    }

    .social-icons a:hover {
      transform: translateY(-3px);
      color: var(--color-accent);
    }

    .heart-icon:hover {
      color: var(--color-accent);
    }

    .creator-name:hover {
      color: var(--color-accent);
    }

    .creator-name:hover::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(-8px);
    }
  }

  /* Instant Tap State for Mobile (Overrides transition speed on press) */
  .footer-links a:active {
    transition: transform 0.05s ease;
    transform: scale(0.95);
    opacity: 1;
    color: var(--color-accent);
  }

  .social-icons a:active {
    transition: transform 0.05s ease;
    transform: scale(0.85);
    color: var(--color-accent);
  }

  .heart-icon:active {
    color: var(--color-accent);
  }

  .creator-name:active {
    color: var(--color-accent);
  }

  /* ===================================== */
  /* Responsive */
  /* ===================================== */

  @media (max-width: 992px) {
    .footer-top {
      flex-direction: column;
      gap: 3rem;
    }

    .footer-brand-section {
      flex: unset;
      max-width: 100%;
    }

    .footer-links-grid {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
  }

  @media (max-width: 768px) {
    .footer-middle {
      flex-direction: column;
      gap: 2rem;
      text-align: center;
    }
  }

  /* Mobile View Specific Tweaks */
  @media (max-width: 576px) {
    .footer {
      padding: 3rem 0 1.5rem 0;
    }

    .footer-top {
      gap: 2rem; /* Slightly reduced overall top gap */
    }

    .footer-brand-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .footer-logo {
      height: 110px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 0.25rem; /* FIX: Decreased gap between logo and subline */
      object-fit: contain;
    }

    .footer-links-grid {
      grid-template-columns: repeat(
        3,
        1fr
      ); /* FIX: Forces all 3 columns into the same row */
      gap: 0.5rem; /* Tighter gap to fit side-by-side */
      text-align: center;
      width: 100%;
      align-items: flex-start; /* Aligns the tops of the columns */
    }

    /* FIX: Scale down titles and links to ensure they fit in 3 columns */
    .footer-title {
      font-size: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .footer-links li {
      margin-bottom: 0.5rem;
    }

    .footer-links a {
      font-size: 0.7rem;
      line-height: 1.3;
    }

    .footer-column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .footer-payments {
      flex-wrap: wrap; /* Allow payment icons to drop to next line */
      justify-content: center;
      gap: 0.75rem;
    }

    .footer-payments img {
      height: 15px;
    }
  }
</style>

<script>
  // Function specifically called by main.js after footer injection
  window.initFooter = function () {
    // 0. Dynamic Account Routing
    const footerAccountLink = document.getElementById("footerAccountLink");
    if (footerAccountLink) {
      if (localStorage.getItem("userRole") === "admin") {
        footerAccountLink.href = "adminDashboard.html?view=profile";
      } else {
        footerAccountLink.href = "userDashboard.html?view=profile";
      }
    }

    // 1. Dynamic Year Logic
    const yearSpan = document.getElementById("current-year");
    if (yearSpan) {
      yearSpan.textContent = new Date().getFullYear();
    }

    // 2. Interactive Heart Toggle Logic
    const heartIcon = document.getElementById("love-icon");
    if (heartIcon) {
      // We use .onclick to ensure we don't accidentally attach multiple listeners
      // if initFooter is called more than once by the dynamic loader
      heartIcon.onclick = function () {
        // Check if it is currently unfilled
        if (this.classList.contains("bi-heart")) {
          this.classList.remove("bi-heart");
          this.classList.add("bi-heart-fill", "filled");
        } else {
          // Otherwise, it is filled, so unfill it
          this.classList.remove("bi-heart-fill", "filled");
          this.classList.add("bi-heart");
        }
      };
    }
  };

  // Fallback initialization just in case it's loaded standalone
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", window.initFooter);
  } else {
    window.initFooter();
  }

  // ==========================================
  // Toast Notification Function (Existing)
  // ==========================================
  window.showToast = function (message) {
    // Remove existing toast if any
    const existingToast = document.querySelector(".toast");
    if (existingToast) {
      existingToast.remove();
    }

    // Create toast element
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    toast.style.cssText = `
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--color-primary);
        color: var(--color-primary-fg);
        padding: 1rem 1.5rem;
        border-radius: 0.5rem;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        animation: slideUp 0.3s ease-out;
    `;

    document.body.appendChild(toast);

    // Remove toast after 3 seconds
    setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transform = "translateY(20px)";
      toast.style.transition = "all 0.3s ease-out";
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  };

  // ==========================================
  // Intersection Observer for Scroll Animations (Existing)
  // ==========================================
  window.observerOptions = {
    threshold: 0.1,
    rootMargin: "0px 0px -50px 0px",
  };

  window.observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = "1";
        entry.target.style.transform = "translateY(0)";
      }
    });
  }, window.observerOptions);

  // Observe elements for scroll animations (Will safely ignore if none exist)
  document.querySelectorAll(".product-card, .brand-card").forEach((el) => {
    window.observer.observe(el);
  });
</script>
