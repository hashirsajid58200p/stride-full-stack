<style>
  /* Global Toast Container */
  #global-toast-container {
    position: fixed;
    top: 6rem;
    right: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    z-index: 99999;
    pointer-events: none; /* Lets clicks pass through empty space */
  }

  /* Individual Toast Card */
  .stride-toast {
    pointer-events: auto; /* Re-enable clicks on the toast itself */
    min-width: 300px;
    max-width: 400px;
    background-color: var(--color-secondary);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);

    /* Animation start state */
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* Bouncy enter effect */
    border-left: 4px solid var(--color-accent);
  }

  /* Animation end state */
  .stride-toast.show {
    transform: translateX(0);
    opacity: 1;
  }

  /* Exit state */
  .stride-toast.hide {
    transform: translateX(120%);
    opacity: 0;
  }

  /* Dynamic Types */
  .stride-toast.success {
    border-left-color: #10b981;
  }
  .stride-toast.error {
    border-left-color: #ef4444;
  }
  .stride-toast.info {
    border-left-color: #3b82f6;
  }
  .stride-toast.warning {
    border-left-color: #f59e0b;
  }

  /* Icon Styling */
  .toast-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
    margin-top: -0.1rem;
  }
  .toast-icon.success {
    color: #10b981;
  }
  .toast-icon.error {
    color: #ef4444;
  }
  .toast-icon.info {
    color: #3b82f6;
  }
  .toast-icon.warning {
    color: #f59e0b;
  }
  .toast-icon.default {
    color: var(--color-accent);
  }

  /* Text Content */
  .toast-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .toast-message {
    color: var(--color-fg);
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
  }

  /* Close Button */
  .toast-close {
    background: transparent;
    border: none;
    color: var(--color-muted-fg);
    cursor: pointer;
    font-size: 1.3rem;
    transition: color 0.2s ease;
    padding: 0;
    line-height: 1;
  }

  .toast-close:hover {
    color: var(--color-fg);
  }
</style>

<div id="global-toast-container"></div>

<script>
  window.initNotifications = function () {
    const container = document.getElementById("global-toast-container");

    // Overwrite any existing showToast function globally
    window.showToast = function (message, type = "success") {
      if (!container) return;

      const toast = document.createElement("div");
      toast.className = `stride-toast ${type}`;

      // Determine Icon based on type
      let iconClass = "bi-check-circle-fill"; // Default success
      if (type === "error") iconClass = "bi-exclamation-circle-fill";
      else if (type === "info") iconClass = "bi-info-circle-fill";
      else if (type === "warning") iconClass = "bi-exclamation-triangle-fill";
      else if (type === "default") iconClass = "bi-bell-fill";

      toast.innerHTML = `
        <i class="bi ${iconClass} toast-icon ${type}"></i>
        <div class="toast-content">
          <span class="toast-message">${message}</span>
        </div>
        <button class="toast-close" aria-label="Close"><i class="bi bi-x"></i></button>
      `;

      // Append to container (stacks them if multiple fire at once)
      container.appendChild(toast);

      // Trigger animation after a tiny delay so CSS registers the transition
      requestAnimationFrame(() => {
        setTimeout(() => toast.classList.add("show"), 10);
      });

      // Setup removal function
      const removeToast = () => {
        toast.classList.remove("show");
        toast.classList.add("hide");
        // Wait for CSS transition to finish before removing from DOM
        setTimeout(() => toast.remove(), 400);
      };

      // Click to close
      toast
        .querySelector(".toast-close")
        .addEventListener("click", removeToast);

      // Auto remove after 3.5 seconds
      setTimeout(removeToast, 3500);
    };
  };

  // Ensure it initializes if script is loaded
  window.initNotifications();
</script>
