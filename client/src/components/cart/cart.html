<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3 class="cart-title">SHOPPING CART</h3>
    <button class="cart-close-btn" id="closeCartBtn" aria-label="Close Cart">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="cart-empty-state" id="cartEmptyState" style="display: none">
    <i class="bi bi-cart-x empty-icon"></i>
    <p>Your cart is currently empty.</p>
    <button
      class="btn btn-primary continue-shopping-btn"
      id="continueShoppingBtn"
    >
      Continue Shopping
    </button>
  </div>

  <div class="cart-filled-state" id="cartFilledState">
    <div class="cart-body">
      <div
        id="cartItemsContainer"
        style="display: flex; flex-direction: column; gap: 1.5rem"
      ></div>

      <div class="cart-recommendations">
        <div class="recommendation-header">
          <h4>You may also like</h4>
        </div>

        <div class="rec-carousel-wrapper">
          <button class="slider-arrow left-arrow" id="recPrevBtn">
            <i class="bi bi-chevron-left"></i>
          </button>

          <div class="rec-track" id="recTrack">
            <div class="recommendation-item">
              <img
                src="../../public/images/shoe-2.jpg"
                alt="Blue Urban Hoodie"
              />
              <div class="rec-details">
                <p class="rec-title">Blue Urban Hoodie</p>
                <p class="rec-price">Rs.2,100.00</p>
              </div>
              <button class="rec-add-btn">
                <i class="bi bi-cart-plus"></i>
              </button>
            </div>
            <div class="recommendation-item">
              <img src="../../public/images/shoe-3.jpg" alt="Cream T-Shirt" />
              <div class="rec-details">
                <p class="rec-title">Cream T-Shirt</p>
                <p class="rec-price">Rs.1,799.00</p>
              </div>
              <button class="rec-add-btn">
                <i class="bi bi-cart-plus"></i>
              </button>
            </div>
          </div>

          <button class="slider-arrow right-arrow" id="recNextBtn">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-mini-coupon">
        <input
          type="text"
          id="sideCouponCode"
          placeholder="Coupon Code (e.g. STRIDE10)"
        />
        <button id="sideApplyCouponBtn">Apply</button>
      </div>

      <div class="cart-subtotal">
        <span class="subtotal-label">Subtotal:</span>
        <span class="subtotal-value" id="cartSubtotalValue">Rs.0.00 PKR</span>
      </div>
      <div class="cart-buttons">
        <a href="shoppingCart.html" class="btn cart-btn-secondary">VIEW CART</a>
        <a href="#" class="btn cart-btn-primary">CHECK OUT</a>
      </div>
    </div>
  </div>
</div>
